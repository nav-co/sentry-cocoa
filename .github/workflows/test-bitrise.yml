name: Bitrise Test

on:
  workflow_dispatch:

jobs:
  ruby-test:
    name: Ruby test
    runs-on:
      labels: [bitrise_pool_name:Bitrise-M4Pro, machine_debug_type:enabled]
    steps:

      - name: Warm CoreSimulator
        run: xcrun simctl list runtimes -j > /dev/null 2>&1 &
        
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        
      - uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        id: cache-ruby
        name: Cache Ruby
        with:
          path: |
            ~/.rbenv/versions
            ~/.rbenv/cache
          key: ruby-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.ruby-version') }}-${{ hashFiles('Gemfile.lock') }}
          restore-keys: |
            ruby-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.ruby-version') }}-

      - name: Install Ruby (Bitrise)
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: |
          RUBY_VERSION="$(cat .ruby-version)"
          if ! rbenv versions --bare | grep -qx "$RUBY_VERSION"; then
            brew upgrade ruby-build
            rbenv install -s "$RUBY_VERSION"
          else
            echo "Ruby $RUBY_VERSION already present — skipping brew/rbenv"
          fi
          bundle install

      - name: Verify Ruby version
        run: |
          EXPECTED="$(cat .ruby-version)"
          echo "Expected: $EXPECTED"
          rbenv version
          ruby -v
          # Fail the job if the active Ruby doesn't match .ruby-version
          case "$(ruby -v)" in
            *"$EXPECTED"*) echo "✓ Ruby $EXPECTED is active" ;;
            *) echo "::error::Active Ruby does not match .ruby-version ($EXPECTED)"; exit 1 ;;
          esac

      - name: Setup Xcode
        id: setup-xcode
        uses: ./.github/actions/setup-xcode
        with:
          version: "16"
